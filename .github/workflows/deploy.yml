name: Build & deploy Mipa Data Sheets PWA

on:
  push:
    branches: [main]
  workflow_dispatch:      # manual "Run workflow" button (forces a fresh scrape)
  schedule:
    - cron: '17 15 * * 1'  # weekly Mon 15:17 UTC — re-scrape to pick up new sheets

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      # Cache the ~223 MB PDF mirror so code-only pushes don't re-download it.
      # Key is tied to the committed index; restore-keys lets any prior mirror seed it.
      - name: Restore PDF mirror cache
        id: pdfcache
        uses: actions/cache@v4
        with:
          path: app/pdfs
          key: mipa-pdfs-${{ hashFiles('app/datasheets.json') }}
          restore-keys: mipa-pdfs-

      # Scrape when: a scheduled/manual refresh, OR a push with no cached mirror yet.
      # A code-only push with a warm cache skips this and deploys in ~1 min.
      # (When run, the scraper skips PDFs already restored from cache.)
      - name: Crawl site + mirror PDFs into app/
        if: ${{ github.event_name != 'push' || steps.pdfcache.outputs.cache-hit != 'true' }}
        shell: pwsh
        run: ./scraper/Crawl-Mipa.ps1 -DelayMs 50

      - name: Report what will be published
        shell: pwsh
        run: |
          $j = Get-Content app/datasheets.json -Raw | ConvertFrom-Json
          $n = (Get-ChildItem app/pdfs -File -ErrorAction SilentlyContinue).Count
          "Publishing $($j.count) products / $n mirrored PDFs (scrape ran: ${{ github.event_name != 'push' || steps.pdfcache.outputs.cache-hit != 'true' }})"

      - name: Stamp build version
        shell: pwsh
        run: |
          $info = [ordered]@{
            version = "1.0.${{ github.run_number }}"
            builtAt = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
            commit  = "${{ github.sha }}".Substring(0,7)
          }
          $info | ConvertTo-Json | Set-Content app/version.json -Encoding UTF8
          Get-Content app/version.json

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: app
      - id: deploy
        uses: actions/deploy-pages@v4
