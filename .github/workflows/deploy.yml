name: Build & deploy Mipa Data Sheets PWA

on:
  push:
    branches: [main]
  workflow_dispatch:      # manual "Run workflow" button
  schedule:
    - cron: '17 15 * * 1'  # weekly Mon 15:17 UTC — re-scrape to pick up new sheets

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      # PowerShell Core (pwsh) is preinstalled on GitHub runners.
      - name: Crawl site + mirror PDFs into app/
        shell: pwsh
        run: ./scraper/Crawl-Mipa.ps1

      - name: Report index size
        shell: pwsh
        run: |
          $j = Get-Content app/datasheets.json -Raw | ConvertFrom-Json
          "Indexed $($j.count) products / $((Get-ChildItem app/pdfs -File).Count) PDFs"

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: app
      - id: deploy
        uses: actions/deploy-pages@v4
